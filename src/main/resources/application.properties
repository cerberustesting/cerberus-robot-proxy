server.port=8093

proxy.defaulttimeout=3600000
proxy.defaultenablecapture=true
proxy.defaultlocalproxyactive=false
scheduledtask.killproxy=0 * * ? * *

scheduledtask.clean=0 * * ? * *
scheduledtask.clean.delayInMinute=20000
chromedriver.path=./chromedriver/chromedriver

#selenium.host=cerberus-executor-selenium
selenium.host=localhost
selenium.port=8092
vnc.host=localhost
vnc.port=15901
vnc.password=secret

# =========================================================================
# Post Start Scripts Configuration
# =========================================================================
# Script 0: Example : ADB Clear
poststart.scripts[0].enabled=true
poststart.scripts[0].executable=adb
poststart.scripts[0].arguments=shell,pm,clear,app.package.name
poststart.scripts[0].waitFor=true
poststart.scripts[0].name=ADB_CLEAR
# Script 1: Example : Frida
poststart.scripts[1].enabled=false
poststart.scripts[1].executable=frida
poststart.scripts[1].arguments=-U,-f,app.package.name,-l,frida.script.path
poststart.scripts[1].waitFor=false
poststart.scripts[1].name=FRIDA